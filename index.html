<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horde Attack Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      background-color: #020617; /* Slate 950 */
      color: #e2e8f0; /* Slate 200 */
    }
    /* Custom scrollbar for dark theme */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a; 
    }
    ::-webkit-scrollbar-thumb {
      background: #334155; 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569; 
    }
    /* Recharts tooltip fix */
    .recharts-tooltip-wrapper {
      outline: none;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "recharts": "https://esm.sh/recharts@2.12.2?external=react,react-dom"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Note: Removed typescript preset to ensure stability in standalone mode -->
  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Legend } from 'recharts';

    // --- ICONS (Inline to remove external dependency) ---
    const PlayIcon = ({ size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
    );
    const RotateCcwIcon = ({ size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"></path>
        <path d="M3 3v9h9"></path>
      </svg>
    );
    const SaveIcon = ({ size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
        <polyline points="17 21 17 13 7 13 7 21"></polyline>
        <polyline points="7 3 7 8 15 8"></polyline>
      </svg>
    );
    const TrashIcon = ({ size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    );
    const ShieldIcon = ({ size = 16, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      </svg>
    );
    const HeartCrackIcon = ({ size = 16, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
        <path d="m12 5 2 2-2 2 2 2"></path>
      </svg>
    );
    const BanIcon = ({ size = 16, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10"></circle>
        <path d="m4.9 4.9 14.2 14.2"></path>
      </svg>
    );
    const PlusIcon = ({ size = 16, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M5 12h14"></path>
        <path d="M12 5v14"></path>
      </svg>
    );

    // --- TYPES / CONSTANTS ---
    const AttackType = {
      NORMAL: 'normal',
      ADVANTAGE: 'advantage',
      DISADVANTAGE: 'disadvantage',
    };

    const CoverType = {
      NONE: 'none',
      HALF: 'half',
      THREE_QUARTERS: 'three_quarters',
    };

    const DamageModifier = {
      NORMAL: 'normal',
      RESISTANCE: 'resistance',
      VULNERABILITY: 'vulnerability',
      IMMUNITY: 'immunity',
    };

    const DICE_OPTIONS = [4, 6, 8, 10, 12, 20];
    const DAMAGE_TYPES = [
      'Slashing', 'Piercing', 'Bludgeoning', 
      'Acid', 'Cold', 'Fire', 'Force', 'Lightning', 
      'Necrotic', 'Poison', 'Psychic', 'Radiant', 'Thunder'
    ];
    
    const DAMAGE_COLORS = {
      Slashing: '#cbd5e1', // slate-300
      Piercing: '#94a3b8', // slate-400
      Bludgeoning: '#64748b', // slate-500
      Acid: '#a3e635', // lime-400
      Cold: '#22d3ee', // cyan-400
      Fire: '#fb923c', // orange-400
      Force: '#c084fc', // purple-400
      Lightning: '#facc15', // yellow-400
      Necrotic: '#475569', // slate-600
      Poison: '#34d399', // emerald-400
      Psychic: '#f472b6', // pink-400
      Radiant: '#fbbf24', // amber-400
      Thunder: '#818cf8', // indigo-400
    };

    const COVER_BONUS = {
      [CoverType.NONE]: 0,
      [CoverType.HALF]: 2,
      [CoverType.THREE_QUARTERS]: 5,
    };

    // New Data Structure for Multiple Damage Types
    const createDamageComponent = () => ({
      id: Date.now() + Math.random(),
      diceCount: 1,
      diceType: 6,
      bonus: 0,
      damageType: 'Slashing',
      modifier: DamageModifier.NORMAL
    });

    // Define defaults outside component to reuse
    const DEFAULT_CONFIG = {
      numMinions: 50,
      targetAC: 15,
      attackBonus: 4,
      attackType: AttackType.NORMAL,
      cover: CoverType.NONE,
      // Replaces simple dice fields with array
      damageComponents: [createDamageComponent()], 
    };

    // --- SERVICE ---
    const rollDie = (sides) => Math.floor(Math.random() * sides) + 1;

    const runSimulation = (config) => {
      const results = [];
      const effectiveAC = config.targetAC + COVER_BONUS[config.cover];
      
      let totalHits = 0;
      let totalCrits = 0;
      let totalCritMisses = 0;
      let totalDamage = 0;

      for (let i = 0; i < config.numMinions; i++) {
        const rolls = [];
        let finalDie = 0;

        // Roll d20s
        const d1 = rollDie(20);
        rolls.push(d1);

        if (config.attackType === AttackType.NORMAL) {
          finalDie = d1;
        } else {
          const d2 = rollDie(20);
          rolls.push(d2);
          
          if (config.attackType === AttackType.ADVANTAGE) {
            finalDie = Math.max(d1, d2);
          } else {
            // DISADVANTAGE
            finalDie = Math.min(d1, d2);
          }
        }

        const attackTotal = finalDie + config.attackBonus;
        
        // Determine Hit/Miss
        let isCrit = false;
        let isCritMiss = false;
        let isHit = false;

        if (finalDie === 20) {
          isCrit = true;
          isHit = true; 
        } else if (finalDie === 1) {
          isCritMiss = true;
          isHit = false; 
        } else {
          isHit = attackTotal >= effectiveAC;
        }

        // Calculate Damage (Complex)
        let totalDamageForHit = 0;
        const damageBreakdown = [];

        if (isHit) {
          // Iterate over all damage components (e.g., 1d8 slashing + 1d6 fire)
          config.damageComponents.forEach(comp => {
            let componentRawDamage = 0;
            const componentRolls = [];
            
            // Crit doubles the number of dice rolled
            const diceToRoll = isCrit ? comp.diceCount * 2 : comp.diceCount;
            
            for (let d = 0; d < diceToRoll; d++) {
              const r = rollDie(comp.diceType);
              componentRolls.push(r);
              componentRawDamage += r;
            }
            componentRawDamage += comp.bonus;
            componentRawDamage = Math.max(0, componentRawDamage); // Min 0

            // Apply Specific Modifier
            let finalComponentDamage = componentRawDamage;
            if (comp.modifier === DamageModifier.RESISTANCE) {
              finalComponentDamage = Math.floor(componentRawDamage / 2);
            } else if (comp.modifier === DamageModifier.VULNERABILITY) {
              finalComponentDamage = componentRawDamage * 2;
            } else if (comp.modifier === DamageModifier.IMMUNITY) {
              finalComponentDamage = 0;
            }

            totalDamageForHit += finalComponentDamage;
            damageBreakdown.push({
              type: comp.damageType,
              modifier: comp.modifier,
              raw: componentRawDamage,
              final: finalComponentDamage,
              rolls: componentRolls
            });
          });
        }

        // Aggregates
        if (isHit) totalHits++;
        if (isCrit) totalCrits++;
        if (isCritMiss) totalCritMisses++;
        totalDamage += totalDamageForHit;

        results.push({
          id: i,
          rolls,
          finalDie,
          attackTotal,
          isCrit,
          isCritMiss,
          isHit,
          totalDamage: totalDamageForHit,
          damageBreakdown // Array of {type, modifier, raw, final, rolls}
        });
      }

      return {
        totalAttacks: config.numMinions,
        totalHits,
        totalCrits,
        totalCritMisses,
        totalDamage,
        averageDamage: totalHits > 0 ? totalDamage / totalHits : 0,
        results,
      };
    };

    // --- COMPONENTS ---

    // Custom Modal Component
    const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel }) => {
      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
          <div className="bg-slate-900 border border-slate-800 rounded-xl shadow-2xl max-w-sm w-full p-6 animate-in fade-in zoom-in duration-200">
            <h3 className="text-lg font-bold text-slate-100 mb-2">{title}</h3>
            <p className="text-slate-400 mb-6 text-sm leading-relaxed">{message}</p>
            <div className="flex gap-3 justify-end">
              <button
                onClick={onCancel}
                className="px-4 py-2 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-800 transition-colors"
              >
                Abbrechen
              </button>
              <button
                onClick={onConfirm}
                className="px-4 py-2 rounded-lg text-sm font-medium bg-rose-600 hover:bg-rose-500 text-white shadow-lg shadow-rose-900/20 transition-colors"
              >
                Bestätigen
              </button>
            </div>
          </div>
        </div>
      );
    };

    // Controls
    const Controls = ({ config, setConfig, onRun, onClear, isLoading }) => {
      const [newPresetName, setNewPresetName] = useState("");
      const [deleteModalOpen, setDeleteModalOpen] = useState(false);
      const [resetModalOpen, setResetModalOpen] = useState(false);
      const [presetToDelete, setPresetToDelete] = useState(null);
      
      // Load presets
      const [presets, setPresets] = useState(() => {
        try {
          const saved = localStorage.getItem('horde_presets');
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });

      useEffect(() => {
        localStorage.setItem('horde_presets', JSON.stringify(presets));
      }, [presets]);

      const handleChange = (field, value) => {
        setConfig(prev => ({ ...prev, [field]: value }));
      };

      // Damage Component Logic
      const addDamageComponent = () => {
        setConfig(prev => ({
          ...prev,
          damageComponents: [...prev.damageComponents, createDamageComponent()]
        }));
      };

      const removeDamageComponent = (id) => {
        setConfig(prev => ({
          ...prev,
          damageComponents: prev.damageComponents.filter(c => c.id !== id)
        }));
      };

      const updateDamageComponent = (id, field, value) => {
        setConfig(prev => ({
          ...prev,
          damageComponents: prev.damageComponents.map(c => 
            c.id === id ? { ...c, [field]: value } : c
          )
        }));
      };

      const loadPrefab = (pConfig) => {
        // Migration logic for old presets that used simple diceCount/diceType
        let finalConfig = { ...DEFAULT_CONFIG, ...pConfig };
        
        // If old config format detected (missing damageComponents)
        if (!finalConfig.damageComponents || finalConfig.damageComponents.length === 0) {
          finalConfig.damageComponents = [{
            id: Date.now(),
            diceCount: pConfig.diceCount || 1,
            diceType: pConfig.diceType || 6,
            bonus: pConfig.damageBonus || 0,
            damageType: 'Slashing',
            modifier: pConfig.damageModifier || DamageModifier.NORMAL
          }];
        }
        
        // Ensure every component has an ID (fixes React key issues on older presets)
        finalConfig.damageComponents = finalConfig.damageComponents.map(c => ({
           ...c,
           id: c.id || Math.random()
        }));

        setConfig(finalConfig);
      };

      const saveCurrentAsPreset = () => {
        if (newPresetName && newPresetName.trim()) {
          setPresets(prev => [...prev, { name: newPresetName.trim(), config: { ...config } }]);
          setNewPresetName(""); 
        }
      };

      const requestDelete = (index) => {
        setPresetToDelete(index);
        setDeleteModalOpen(true);
      };

      const confirmDelete = () => {
        if (presetToDelete !== null) {
          setPresets(prev => prev.filter((_, i) => i !== presetToDelete));
        }
        setDeleteModalOpen(false);
        setPresetToDelete(null);
      };

      const cancelDelete = () => {
        setDeleteModalOpen(false);
        setPresetToDelete(null);
      };

      const requestReset = () => {
        setResetModalOpen(true);
      };

      const confirmReset = () => {
        onClear();
        setResetModalOpen(false);
      };

      return (
        <>
          <ConfirmModal 
            isOpen={deleteModalOpen}
            title="Preset löschen?"
            message="Möchtest du dieses Preset wirklich unwiderruflich löschen?"
            onConfirm={confirmDelete}
            onCancel={cancelDelete}
          />

          <ConfirmModal 
            isOpen={resetModalOpen}
            title="Konfiguration zurücksetzen?"
            message="Dies setzt alle Einstellungen auf die Standardwerte zurück. Fortfahren?"
            onConfirm={confirmReset}
            onCancel={() => setResetModalOpen(false)}
          />
          
          <div className="bg-slate-900/80 backdrop-blur-md border border-slate-800 rounded-xl p-6 shadow-xl flex flex-col gap-6 relative">
            
            <div className="flex items-center justify-between">
              <h2 className="text-xl font-bold text-slate-100 flex items-center gap-2">
                Combat Configuration
              </h2>
            </div>

            {/* Preset Management */}
            <div className="bg-slate-950/50 rounded-lg border border-slate-800 p-3 space-y-3">
               <div className="flex gap-2">
                 <input 
                   type="text"
                   value={newPresetName}
                   onChange={(e) => setNewPresetName(e.target.value)}
                   placeholder="Preset Name (z.B. Skelett)..."
                   className="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 outline-none placeholder:text-slate-600"
                 />
                 <button 
                    onClick={saveCurrentAsPreset}
                    disabled={!newPresetName.trim()}
                    className="bg-cyan-900/30 hover:bg-cyan-900/50 text-cyan-400 border border-cyan-800/50 rounded-lg px-3 py-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                    title="Speichern"
                 >
                   <SaveIcon size={18} />
                 </button>
               </div>

               {presets.length > 0 ? (
                 <div className="flex flex-wrap gap-2 max-h-[100px] overflow-y-auto custom-scrollbar">
                   {presets.map((p, i) => (
                      <div key={i} className="group flex items-center gap-1 bg-slate-800 border border-slate-700 rounded-md pl-2 pr-1 py-1 transition-colors hover:border-slate-500">
                        <button 
                           onClick={() => loadPrefab(p.config)}
                           className="text-xs text-slate-300 hover:text-white font-medium truncate max-w-[100px] text-left"
                           title={`Load ${p.name}`}
                        >
                          {p.name}
                        </button>
                        <button 
                          onClick={() => requestDelete(i)}
                          className="text-slate-500 hover:text-rose-400 p-1 rounded hover:bg-slate-700/50 transition-colors"
                          title="Löschen"
                        >
                          <TrashIcon size={12} />
                        </button>
                      </div>
                   ))}
                 </div>
               ) : (
                  <div className="text-xs text-slate-600 italic text-center py-1">
                    Keine Presets gespeichert.
                  </div>
               )}
            </div>

            <div className="h-px bg-slate-800" />

            {/* Config Inputs */}
            <div className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">
                  Minion Count
                </label>
                <input
                  type="number"
                  min={1}
                  max={50000}
                  value={config.numMinions}
                  onChange={(e) => handleChange('numMinions', parseInt(e.target.value) || 0)}
                  className="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 text-slate-100 focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition-all"
                />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">
                    Target AC
                  </label>
                  <input
                    type="number"
                    value={config.targetAC}
                    onChange={(e) => handleChange('targetAC', parseInt(e.target.value) || 0)}
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 text-slate-100 focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none"
                  />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">
                    Attack Bonus
                  </label>
                  <input
                    type="number"
                    value={config.attackBonus}
                    onChange={(e) => handleChange('attackBonus', parseInt(e.target.value) || 0)}
                    className="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 text-slate-100 focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none"
                  />
                </div>
              </div>
            </div>

            <div className="h-px bg-slate-800" />

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                  Attack Type
                </label>
                <div className="space-y-2">
                  {Object.values(AttackType).map((type) => (
                    <label key={type} className="flex items-center gap-3 p-2 rounded-lg hover:bg-slate-800/50 cursor-pointer transition-colors">
                      <input
                        type="radio"
                        name="attackType"
                        checked={config.attackType === type}
                        onChange={() => handleChange('attackType', type)}
                        className="text-cyan-500 focus:ring-cyan-500 bg-slate-950 border-slate-600"
                      />
                      <span className="capitalize text-slate-300">{type}</span>
                    </label>
                  ))}
                </div>
              </div>

              <div>
                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                  Target Cover
                </label>
                <div className="space-y-2">
                  {[
                    { val: CoverType.NONE, label: 'None' },
                    { val: CoverType.HALF, label: 'Half (+2 AC)' },
                    { val: CoverType.THREE_QUARTERS, label: '3/4 (+5 AC)' }
                  ].map((opt) => (
                    <label key={opt.val} className="flex items-center gap-3 p-2 rounded-lg hover:bg-slate-800/50 cursor-pointer transition-colors">
                      <input
                        type="radio"
                        name="cover"
                        checked={config.cover === opt.val}
                        onChange={() => handleChange('cover', opt.val)}
                        className="text-cyan-500 focus:ring-cyan-500 bg-slate-950 border-slate-600"
                      />
                      <span className="text-slate-300">{opt.label}</span>
                    </label>
                  ))}
                </div>
              </div>
            </div>

            <div className="h-px bg-slate-800" />

            {/* Dynamic Damage Components */}
            <div>
              <div className="flex justify-between items-center mb-3">
                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
                  Damage Components
                </label>
                <button 
                  onClick={addDamageComponent}
                  className="flex items-center gap-1 text-xs font-bold text-cyan-400 hover:text-cyan-300 transition-colors"
                >
                  <div className="bg-cyan-900/50 rounded-full p-0.5"><PlusIcon size={12}/></div>
                  Add Type
                </button>
              </div>
              
              <div className="space-y-3">
                {config.damageComponents.map((comp, index) => (
                  <div key={comp.id} className="bg-slate-950 border border-slate-700 rounded-lg p-3 relative group">
                    {config.damageComponents.length > 1 && (
                      <button 
                        onClick={() => removeDamageComponent(comp.id)}
                        className="absolute -top-2 -right-2 bg-slate-800 hover:bg-rose-900 text-slate-400 hover:text-rose-200 p-1 rounded-full shadow border border-slate-700 transition-colors opacity-0 group-hover:opacity-100"
                        title="Remove component"
                      >
                        <TrashIcon size={12} />
                      </button>
                    )}

                    {/* Row 1: Dice & Bonus */}
                    <div className="flex gap-2 items-center mb-3">
                      <input
                        type="number"
                        min={1}
                        value={comp.diceCount}
                        onChange={(e) => updateDamageComponent(comp.id, 'diceCount', parseInt(e.target.value) || 1)}
                        className="w-14 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-center text-sm text-slate-100 focus:ring-1 focus:ring-cyan-500 outline-none"
                      />
                      <span className="text-slate-500 font-bold text-xs">d</span>
                      <select
                        value={comp.diceType}
                        onChange={(e) => updateDamageComponent(comp.id, 'diceType', parseInt(e.target.value))}
                        className="w-16 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-sm text-slate-100 focus:ring-1 focus:ring-cyan-500 outline-none"
                      >
                        {DICE_OPTIONS.map(d => <option key={d} value={d}>d{d}</option>)}
                      </select>
                      <span className="text-slate-500 font-bold text-xs">+</span>
                      <input
                        type="number"
                        value={comp.bonus}
                        onChange={(e) => updateDamageComponent(comp.id, 'bonus', parseInt(e.target.value) || 0)}
                        className="w-14 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-center text-sm text-slate-100 focus:ring-1 focus:ring-cyan-500 outline-none"
                      />
                    </div>

                    {/* Row 2: Type & Modifier */}
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">Damage Type</label>
                        <select
                          value={comp.damageType}
                          onChange={(e) => updateDamageComponent(comp.id, 'damageType', e.target.value)}
                          className="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-xs text-slate-100 focus:ring-1 focus:ring-cyan-500 outline-none"
                        >
                          {DAMAGE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">Target is...</label>
                        <select
                          value={comp.modifier}
                          onChange={(e) => updateDamageComponent(comp.id, 'modifier', e.target.value)}
                          className={`
                            w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-xs focus:ring-1 focus:ring-cyan-500 outline-none font-medium
                            ${comp.modifier === DamageModifier.NORMAL ? 'text-slate-300' : ''}
                            ${comp.modifier === DamageModifier.RESISTANCE ? 'text-emerald-400' : ''}
                            ${comp.modifier === DamageModifier.VULNERABILITY ? 'text-rose-400' : ''}
                            ${comp.modifier === DamageModifier.IMMUNITY ? 'text-slate-500' : ''}
                          `}
                        >
                          <option value={DamageModifier.NORMAL}>Normal</option>
                          <option value={DamageModifier.RESISTANCE}>Resistant (½)</option>
                          <option value={DamageModifier.VULNERABILITY}>Vulnerable (×2)</option>
                          <option value={DamageModifier.IMMUNITY}>Immune (0)</option>
                        </select>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="pt-4 flex gap-3">
              <button
                onClick={onRun}
                disabled={isLoading}
                className="flex-1 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-cyan-900/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
              >
                <PlayIcon size={20} className={isLoading ? "animate-pulse" : ""} />
                {isLoading ? 'Simulating...' : 'Attack!'}
              </button>
              <button
                onClick={requestReset}
                className="bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 px-4 rounded-xl transition-colors flex items-center justify-center"
                title="Reset"
              >
                <RotateCcwIcon size={20} />
              </button>
            </div>
          </div>
        </>
      );
    };

    // Custom Tooltip for Damage Composition
    const CustomTooltip = ({ active, payload, label }) => {
      if (active && payload && payload.length) {
        const data = payload[0].payload;
        return (
          <div className="bg-slate-900 border border-slate-700 p-3 rounded-lg shadow-xl text-xs z-50">
            <p className="font-bold text-slate-200 mb-1 text-sm border-b border-slate-800 pb-1">
              Damage: {label}
            </p>
            <p className="text-slate-400 mb-2">
              Frequency: <span className="text-cyan-400 font-bold">{data.count} hits</span>
            </p>
            
            {data.meta && Object.keys(data.meta).length > 0 && (
              <div className="space-y-1">
                <p className="font-semibold text-slate-500 uppercase text-[10px] tracking-wider mb-1">Avg Composition per Hit</p>
                {Object.entries(data.meta).map(([type, totalVal]) => (
                  <div key={type} className="flex items-center gap-2">
                    <div 
                      className="w-2 h-2 rounded-full" 
                      style={{ backgroundColor: DAMAGE_COLORS[type] || '#fff' }}
                    />
                    <span className="text-slate-300">{type}:</span>
                    <span className="text-slate-200 font-mono">
                      {(totalVal / data.count).toFixed(1)}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }
      return null;
    };

    // StatsBoard
    const StatsBoard = ({ summary }) => {
      if (!summary) {
        return (
          <div className="h-full flex flex-col items-center justify-center text-slate-600 space-y-2 border-2 border-dashed border-slate-800 rounded-xl p-8">
            <span className="text-4xl">⚔️</span>
            <p>Awaiting combat data...</p>
          </div>
        );
      }

      // Process Data for Stacked Bar Chart & Totals
      const activeDamageTypes = new Set();
      const bins = {}; 
      const totalDamageByType = {}; 

      summary.results.forEach(r => {
        const dmg = r.totalDamage;
        if (dmg > 0) {
          if (!bins[dmg]) {
            bins[dmg] = { count: 0, totalDmgInBin: 0, breakdown: {} };
          }
          
          bins[dmg].count++;
          bins[dmg].totalDmgInBin += dmg;

          r.damageBreakdown.forEach(part => {
             const t = part.type;
             activeDamageTypes.add(t);
             
             // Chart bins
             bins[dmg].breakdown[t] = (bins[dmg].breakdown[t] || 0) + part.final;
             
             // Global totals
             totalDamageByType[t] = (totalDamageByType[t] || 0) + part.final;
          });
        }
      });
      
      const chartData = Object.keys(bins).map(k => {
        const dmgVal = parseInt(k);
        const bin = bins[k];
        const dataPoint = { 
          dmg: dmgVal, 
          count: bin.count,
          meta: bin.breakdown 
        };
        
        const safeTotal = bin.totalDmgInBin || 1; 

        Object.keys(bin.breakdown).forEach(type => {
           const typeTotal = bin.breakdown[type];
           const fraction = typeTotal / safeTotal;
           dataPoint[type] = parseFloat((bin.count * fraction).toFixed(2)); 
        });
        
        return dataPoint;
      }).sort((a,b) => a.dmg - b.dmg);

      const typeList = Array.from(activeDamageTypes).sort();

      // Render breakdown for Total Damage Card
      const totalDamageSub = (
        <div className="flex flex-col gap-1 mt-3 pt-2 border-t border-slate-700/50">
           {Object.keys(totalDamageByType).length > 0 ? (
             Object.entries(totalDamageByType)
               .sort((a, b) => b[1] - a[1])
               .map(([type, val]) => (
                 <div key={type} className="flex justify-between items-center text-xs">
                   <span className="flex items-center gap-1.5 text-slate-400">
                     <div className="w-2 h-2 rounded-full" style={{ backgroundColor: DAMAGE_COLORS[type] || '#94a3b8' }} />
                     {type}
                   </span>
                   <span className="font-mono text-slate-300">{val.toLocaleString()}</span>
                 </div>
               ))
           ) : (
             <span className="text-slate-500 italic">No damage dealt</span>
           )}
           <div className="mt-2 text-[10px] text-right text-slate-500 font-medium">
             Avg: {summary.averageDamage.toFixed(1)} / hit
           </div>
        </div>
      );

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
          <StatCard 
            label="Total Hits" 
            value={summary.totalHits} 
            sub={`Hit Rate: ${summary.totalAttacks > 0 ? ((summary.totalHits / summary.totalAttacks) * 100).toFixed(1) : 0}%`}
            color="text-emerald-400"
            borderColor="border-emerald-500/20"
          />
          <StatCard 
            label="Critical Hits" 
            value={summary.totalCrits}
            sub={`${summary.totalAttacks > 0 ? ((summary.totalCrits / summary.totalAttacks) * 100).toFixed(1) : 0}% Chance`}
            color="text-amber-400"
            borderColor="border-amber-500/20"
          />
          <StatCard 
            label="Total Damage" 
            value={summary.totalDamage}
            sub={totalDamageSub}
            color="text-cyan-400"
            borderColor="border-cyan-500/20"
          />
          <div className="bg-slate-900/50 border border-slate-800 rounded-xl p-4 flex flex-col">
            <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Damage Distribution (Stacked)</span>
            <div className="flex-1 min-h-[80px]">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={chartData}>
                  <Tooltip content={<CustomTooltip />} cursor={{fill: 'rgba(255,255,255,0.05)'}} />
                  {typeList.map(t => (
                    <Bar 
                      key={t} 
                      dataKey={t} 
                      stackId="a" 
                      fill={DAMAGE_COLORS[t] || '#0ea5e9'} 
                      radius={[0,0,0,0]} 
                    />
                  ))}
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
      );
    };

    const StatCard = ({ label, value, sub, color, borderColor }) => (
      <div className={`bg-slate-900/50 backdrop-blur border ${borderColor} rounded-xl p-4 flex flex-col justify-between`}>
        <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">{label}</span>
        <div className="mt-2">
          <div className={`text-3xl font-black ${color} tabular-nums`}>
            {value.toLocaleString()}
          </div>
          <div className="text-xs text-slate-500 mt-1 font-medium">
            {sub}
          </div>
        </div>
      </div>
    );

    // AttackLog
    const AttackLog = ({ results }) => {
      if (!results || results.length === 0) return null;

      const displayResults = results.slice(0, 100); 

      return (
        <div className="mt-6 bg-slate-900/80 border border-slate-800 rounded-xl overflow-hidden shadow-lg flex flex-col h-[600px]">
          <div className="bg-slate-800/50 p-3 border-b border-slate-700 flex justify-between items-center">
            <h3 className="font-bold text-slate-200 text-sm">Combat Log</h3>
            <span className="text-xs text-slate-500">Showing first {displayResults.length} of {results.length}</span>
          </div>
          
          <div className="overflow-y-auto flex-1 p-2 space-y-1 custom-scrollbar">
            {displayResults.map((res) => (
              <div key={res.id} className="text-sm p-3 rounded bg-slate-950/30 border border-slate-800/50 flex items-start gap-3 hover:bg-slate-800/50 transition-colors">
                <div className={`
                  px-2 py-1 rounded text-xs font-bold uppercase tracking-wide min-w-[70px] text-center mt-1
                  ${res.isCrit ? 'bg-amber-900/50 text-amber-200 border border-amber-800' : ''}
                  ${res.isCritMiss ? 'bg-rose-900/30 text-rose-300 border border-rose-900' : ''}
                  ${!res.isCrit && !res.isCritMiss && res.isHit ? 'bg-emerald-900/30 text-emerald-300 border border-emerald-900' : ''}
                  ${!res.isCrit && !res.isCritMiss && !res.isHit ? 'bg-slate-800 text-slate-400 border border-slate-700' : ''}
                `}>
                  {res.isCrit ? 'Crit!' : res.isCritMiss ? 'Fumble' : res.isHit ? 'Hit' : 'Miss'}
                </div>

                <div className="flex-1">
                  <div className="flex justify-between items-start">
                    <span className="font-semibold text-slate-300">Minion #{res.id + 1}</span>
                    {res.isHit && (
                      <div className="text-right">
                         <span className="font-bold text-cyan-300 text-lg block">{res.totalDamage} Dmg</span>
                      </div>
                    )}
                  </div>
                  
                  <div className="text-xs text-slate-500 mt-1 space-y-1">
                    <div>
                      Attack: Rolled [{res.rolls.join(', ')}] → Used <strong>{res.finalDie}</strong> + Mod = <strong className={res.isCrit ? 'text-amber-500' : ''}>{res.attackTotal}</strong>
                    </div>
                    {res.isHit && (
                      <div className="flex flex-col gap-1 mt-1">
                        {res.damageBreakdown.map((part, idx) => (
                          <div key={idx} className="flex items-center gap-2 bg-slate-900/50 p-1 rounded border border-slate-800/50">
                             <div className="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
                             <span className="text-slate-300 font-medium">
                               {part.type}: {part.final}
                             </span>
                             <span className="text-slate-600">
                               (Rolled {part.raw})
                             </span>
                             {part.modifier === DamageModifier.RESISTANCE && <ShieldIcon size={12} className="text-emerald-500" />}
                             {part.modifier === DamageModifier.VULNERABILITY && <HeartCrackIcon size={12} className="text-rose-500" />}
                             {part.modifier === DamageModifier.IMMUNITY && <BanIcon size={12} className="text-slate-500" />}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            ))}
            {results.length > 100 && (
              <div className="text-center py-4 text-xs text-slate-600 italic">
                ... {results.length - 100} more entries hidden for performance ...
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- MAIN APP ---
    const App = () => {
      const [config, setConfig] = useState(DEFAULT_CONFIG);

      const [simulationResults, setSimulationResults] = useState(null);
      const [isSimulating, setIsSimulating] = useState(false);

      const handleRun = () => {
        setIsSimulating(true);
        // Small timeout to allow UI to render "Simulating..." state
        setTimeout(() => {
          try {
            const results = runSimulation(config);
            setSimulationResults(results);
          } catch (e) {
            console.error("Simulation failed:", e);
          }
          setIsSimulating(false);
        }, 50);
      };

      const handleClear = () => {
        setSimulationResults(null);
        setConfig(DEFAULT_CONFIG);
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-200 font-sans selection:bg-cyan-500/30">
          <div className="max-w-[1400px] mx-auto p-4 md:p-6 lg:p-8">
            
            <header className="mb-8 border-b border-slate-800 pb-6">
              <h1 className="text-3xl md:text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
                Horde Attack Simulator
              </h1>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
              <div className="lg:col-span-4 xl:col-span-3 sticky top-6">
                <Controls 
                  config={config} 
                  setConfig={setConfig} 
                  onRun={handleRun}
                  onClear={handleClear}
                  isLoading={isSimulating}
                />
              </div>

              <div className="lg:col-span-8 xl:col-span-9 space-y-6">
                <StatsBoard summary={simulationResults} />
                <AttackLog results={simulationResults ? simulationResults.results : null} />
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- MOUNT ---
    const root = createRoot(document.getElementById('root'));
    root.render(
      <React.StrictMode>
        <App />
      </React.StrictMode>
    );
  </script>
</body>
</html>
